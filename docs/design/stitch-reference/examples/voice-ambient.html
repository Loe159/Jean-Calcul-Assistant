<style>
        body {
            background-color: #101415;
            color: #e0e3e5;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .ambient-glow {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80vw; height: 80vw; max-width: 600px; max-height: 600px;
            background: radial-gradient(circle, rgba(138, 91, 245, 0.15) 0%, rgba(16, 20, 21, 0) 70%);
            border-radius: 50%; pointer-events: none; z-index: 0;
        }
        .sphere-container { position: relative; width: 200px; height: 200px; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .sphere {
            width: 120px; height: 120px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #a4c9ff, #0164b4);
            box-shadow: 0 0 40px rgba(164, 201, 255, 0.4), inset -20px -20px 40px rgba(0, 49, 93, 0.5);
            filter: blur(2px); transition: all 0.2s ease-in-out;
        }
        .ring { position: absolute; border-radius: 50%; border: 1px solid rgba(255,255,255,.1); top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .ring-1 { width: 140px; height: 140px; animation: spin-slow 8s linear infinite; }
        .ring-2 { width: 160px; height: 160px; border: 1px dashed rgba(255,255,255,.2); animation: spin-slow 12s linear infinite reverse; }
        .ring-3 { width: 190px; height: 190px; border: 1px dotted rgba(164,201,255,.3); animation: spin-slow 16s linear infinite; }
        @keyframes pulse-sphere { 0%{transform:scale(.95);box-shadow:0 0 30px rgba(164,201,255,.3)} 50%{transform:scale(1.05);box-shadow:0 0 60px rgba(164,201,255,.6)} 100%{transform:scale(.95);box-shadow:0 0 30px rgba(164,201,255,.3)} }
        .listening-active .sphere { animation: pulse-sphere 1.5s ease-in-out infinite; }
        body { min-height: max(884px, 100dvh); }
</style></head>
<body class="antialiased font-body-md text-body-md">
<div class="ambient-glow animate-pulse-slow"></div>
<main class="relative z-10 flex flex-col items-center justify-center w-full max-w-4xl px-container-padding text-center">
<div class="sphere-container listening-active mb-12"><div class="ring ring-1"></div><div class="ring ring-2"></div><div class="ring ring-3"></div><div class="sphere"></div></div>
<div class="relative"><h1 class="font-display-lg md:hidden text-display-lg-mobile text-on-surface tracking-tight" style="text-shadow:0 0 20px rgba(224,227,229,.3)">Je vous écoute...</h1><h1 class="font-display-lg hidden md:block text-display-lg text-on-surface tracking-tight" style="text-shadow:0 0 20px rgba(224,227,229,.3)">Je vous écoute...</h1><div class="mt-8 flex items-center justify-center gap-3 opacity-60"><span class="material-symbols-outlined text-outline" style="font-variation-settings:'FILL' 1">mic</span><span class="font-label-sm text-label-sm text-outline-variant uppercase tracking-widest">Parlez maintenant</span></div></div>
</main>
<script>document.addEventListener('DOMContentLoaded',()=>{const sphere=document.querySelector('.sphere');setInterval(()=>{const scale=.95+Math.random()*.15;const blur=2+Math.random()*3;sphere.style.transform=`scale(${scale})`;sphere.style.filter=`blur(${blur}px)`},800)});</script>
</body></html>
